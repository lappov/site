<!DOCTYPE html>

<head>

    <meta property="og:site_name" content="Redoku">

    <!-- Additional SEO -->
    <meta name="theme-color" content="#ff2e43">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: { bg: '#050608', red: '#ff2e43' } }, fontFamily: { sans: ['Outfit', 'sans-serif'], display: ['Space Grotesk', 'sans-serif'] }, animation: { 'float': 'float 6s ease-in-out infinite', 'pulse-glow': 'pulse-glow 4s ease-in-out infinite' }, keyframes: { float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-20px)' } }, 'pulse-glow': { '0%, 100%': { opacity: '0.3', transform: 'scale(1)' }, '50%': { opacity: '0.6', transform: 'scale(1.1)' } } } } }
        }
    </script>

    <style>
        body { background-color: #050608; color: #e2e8f0; overflow: hidden; }
        .text-glow { text-shadow: 0 0 30px rgba(255, 46, 67, 0.8); }
        .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(to right, rgba(255,46,67,0.05) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,46,67,0.05) 1px, transparent 1px); background-size: 50px 50px; mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%); z-index: -2; }
    </style>
</head>
<body class="antialiased h-screen w-screen flex flex-col items-center justify-center relative">

    <div id="preloader" class="fixed inset-0 z-[999] bg-[#0a0b0e] flex items-center justify-center transition-opacity duration-500">
        <div class="relative flex items-center justify-center">
            <div class="absolute w-20 h-20 border-t-4 border-b-4 border-brand-red border-solid rounded-full animate-spin opacity-50"></div>
            <div class="w-12 h-12 bg-brand-red rounded-xl flex items-center justify-center text-white font-display font-bold text-2xl rotate-3 shadow-[0_0_20px_rgba(255,46,67,0.5)]">R</div>
        </div>
    </div>

    <div class="bg-grid"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-brand-red/20 blur-[100px] rounded-full animate-pulse-glow -z-10"></div>

    <main class="text-center px-4 relative z-10 flex flex-col items-center">
        <div class="relative animate-float mb-8"><i class="fa-solid fa-ghost text-9xl text-brand-red drop-shadow-[0_0_20px_rgba(255,46,67,0.5)]"></i></div>
        <h1 class="text-7xl md:text-9xl font-display font-black text-white mb-4 tracking-tighter">4<span class="text-brand-red text-glow">0</span>4</h1>
        <h2 class="text-2xl md:text-4xl font-display font-bold text-white mb-6 uppercase tracking-widest">Вы упали в пустоту</h2>
        <p class="text-gray-400 text-lg max-w-md mx-auto mb-10 leading-relaxed">Похоже, вы забрели за чанки, которые еще не сгенерировались. Страницы, которую вы ищете, не существует.</p>
        <a href="index.html" class="inline-flex items-center justify-center gap-3 px-8 py-4 bg-brand-red hover:bg-[#ff4c5e] text-white font-display font-bold text-lg rounded-2xl shadow-[0_0_30px_rgba(255,46,67,0.3)] hover:shadow-[0_0_50px_rgba(255,46,67,0.6)] transition-all group">
            <i class="fa-solid fa-compass group-hover:-rotate-45 transition-transform duration-500"></i> Вернуться на спавн
        </a>
    </main>

    <div class="absolute bottom-6 left-6 text-gray-600 font-mono text-xs opacity-50 flex flex-col gap-1">
        <span>XYZ: NaN / -1024 / NaN</span>
        <span>Biome: minecraft:the_void</span>
    </div>

    <script>
        window.addEventListener('load', () => {
            const preloader = document.getElementById('preloader');
            preloader.classList.add('opacity-0');
            setTimeout(() => preloader.style.display = 'none', 500);
        });
    </script>
</body>
</html>
